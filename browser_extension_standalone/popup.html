<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Focus Buddy</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main>
      <header>
        <div class="brand-cat">🐈</div>
        <div>
          <p class="eyebrow">BROWSER FOCUS</p>
          <h1>Focus Buddy</h1>
        </div>
        <span id="status-pill">待机</span>
      </header>

      <section id="launcher">
        <p class="launcher-kicker">完整网页 + 标签页监督</p>
        <h2>把专注台开到新标签页</h2>
        <p class="launcher-copy">
          完整版包含目标解析、域名白名单、宠物养成、声音花园与跨标签走神提醒。
        </p>
        <div class="current-site">
          <span>当前网站</span>
          <b id="current-domain">正在识别…</b>
        </div>
        <button id="open-focus" class="primary">打开完整专注台 <span>→</span></button>
      </section>

      <section id="session" hidden>
        <p id="session-goal" class="session-goal"></p>
        <div id="timer" class="timer">25:00</div>
        <p id="domain-summary" class="domain-summary"></p>
        <div class="stats">
          <span>偏航 <b id="drifts">0</b></span>
          <span>猫币 <b id="coins">0</b></span>
          <span>累计 <b id="total-minutes">0</b> 分钟</span>
        </div>
        <button id="open-session" class="primary secondary-primary">查看完整专注台</button>
        <div class="actions">
          <button id="pause">暂停</button>
          <button id="stop" class="danger">结束</button>
        </div>
      </section>

      <p id="message" role="status"></p>
      <footer>域名识别与专注数据只保存在本机</footer>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
